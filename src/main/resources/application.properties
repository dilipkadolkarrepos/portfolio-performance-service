# Application Name
spring.application.name=portfolio-performance-service

# Server Port
server.port=8080
# Application context path
server.servlet.context-path=/portfolio-performance-service

# -----------------------------------------------------------------------
# Logging — MDC-enriched console pattern
# %X{correlationId} : per-request trace ID set by AttributionMdcFilter
# %X{requestId}     : application idempotency key set by AttributionController
# -----------------------------------------------------------------------
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level [%X{correlationId}] [%X{requestId}] %logger{36} - %msg%n

# -----------------------------------------------------------------------
# Spring Boot Actuator
# -----------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:portfolio-performance-service
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.name=portfolio-performance-service

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

