# Application Name
spring.application.name=portfolio-performance-service

# Server Port
server.port=8080
# Application context path
server.servlet.context-path=/portfolio-performance-service

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:portfolio-performance-service
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.name=portfolio-performance-service

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

